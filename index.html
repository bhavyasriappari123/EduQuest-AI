<!DOCTYPE html>
<html>
<head>
    <title>EduQuest AI</title>
</head>
<body>

    <h1>EduQuest AI - Question Generator</h1>

    <form action="/generate" method="POST">

        <label>Paste your notes:</label>

        <br><br>

        <textarea
        name="notes"
        rows="15"
        cols="80"></textarea>

        <br><br>

        <button type="submit">
            Generate Questions
        </button>

    </form>

</body>
</html>
